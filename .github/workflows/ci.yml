name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # R91 — version 명시 제거. pnpm/action-setup 은 package.json 의 `packageManager` 필드 (pnpm@10.4.1) 를 자동으로 읽음.
      #       둘 다 명시하면 errors out (deploy-pages.yml 코멘트 참조).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate materials.json (data pipeline)
        # client/public/materials.json 는 R91 부터 .gitignore 처리 — CI 에서 매 run 직접 생성.
        run: pnpm build:data
      - name: Generate wiki index (R227/E14 — build:data 선행 필요)
        # client/public/wiki-*.json 은 build:wiki 산출물(.gitignore). 게이트 tests/wiki-index.test.ts 가 읽음.
        run: pnpm build:wiki
      - name: Generate property stats (H6 A-3 — QueryBar 필터 힌트, build:data 선행 필요)
        # client/public/property-stats.json 은 R167 산출물 — 과거 커밋본이 5주 stale 로 서빙되던 실사고.
        run: pnpm build:stats
      - name: Type check (tsc --noEmit)
        run: pnpm check
      - name: "Lint (eslint — 정책 룰: react-hooks·TDZ·dark: 금지)"
        # R210 — 경고는 비차단(staged 도입). error(rules-of-hooks·no-use-before-define·dark:)만 실패.
        run: pnpm lint
      - name: Run unit tests + coverage (vitest)
        # R210 — test:cov: lib/hooks 커버리지 임계(보수적) 하향 회귀 차단. 데이터 불변식 테스트는
        #         위 build:data 산출물(materials.json·build-meta.json)을 읽으므로 순서 의존 OK.
        run: pnpm test:cov
      - name: Build production bundle
        run: pnpm build

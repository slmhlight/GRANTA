name: Deploy to GitHub Pages

# Builds the Vite static site and publishes it to GitHub Pages.
# The app is a project site served from https://<owner>.github.io/<repo>/,
# so VITE_BASE / VITE_ROUTER_BASE must match the repository name.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Permissions required by the official Pages deployment actions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Repo is slmhlight/GRANTA -> site lives under /GRANTA/.
      # vite `base` needs the trailing slash; wouter `base` must NOT have it.
      VITE_BASE: /GRANTA/
      VITE_ROUTER_BASE: /GRANTA
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Do NOT pin a version here — pnpm/action-setup reads it from the
      # "packageManager" field in package.json (pnpm@10.4.1). Specifying both errors out.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build data (regenerate client/public/materials.json)
        run: pnpm build:data

      # R227/E14 — wiki-index/backlinks 는 gitignore 된 build:wiki 산출물.
      # 이 스텝이 빠지면 배포 사이트에서 fetch 404 → 재료 자동링크·백링크 카드가 조용히 전멸한다.
      # (tests/pipeline-integrity.test.ts 가 이 스텝의 존재를 게이트함)
      - name: Build wiki index (material auto-links & backlinks)
        run: pnpm build:wiki

      - name: Build static site
        run: pnpm exec vite build

      - name: SPA fallback (serve index.html for unknown routes)
        run: cp dist/public/index.html dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
